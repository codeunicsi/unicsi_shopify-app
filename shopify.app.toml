# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "fa93076bcceb7b78a3ed817668360340"
name = "Unicsi Dropshipping India"
application_url = "https://unicsi-app-production.up.railway.app/"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_metaobject_definitions,write_metaobjects,write_products"

[auth]
redirect_urls = [ "https://unicsi-app-production.up.railway.app/api/auth" ]

# Product metafield used by the app to track imported products
[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Unicsi Source Info"
description = "Stores the source information for products imported through the Unicsi Dropshipping India app."

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

# Metaobject definition used internally by the app
[metaobjects.app.example]
name = "Unicsi Product Metadata"
description = "Stores additional structured information related to dropshipping products imported using the Unicsi app."

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
